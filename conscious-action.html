<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>意識行動主權</title><link rel="stylesheet" href="styles.css"></head><body><main class="container"><nav class="nav no-print"><a href="index.html">← 回首頁</a></nav>
<section class="hero"><div class="eyebrow">意識行動主權</div><h1>我知道舊方法不可行，但我還是一直往那邊想</h1><p class="lead">有時候，我不是不知道。我知道舊方法沒有用了，但我的意識還是一直走回那條路。</p><p>我可能一直想讓對方懂，一直在腦中排練要怎麼說，一直想證明自己沒有錯，或一直用同一種方法，解一個已經不能用那種方法解決的問題。</p><p>這一頁不是要你立刻想出新方法。先看見：你的意識一直想往哪裡去。</p></section>
<form data-form>
<section class="prompt-card"><div class="num">覺察 01</div><label>我明明知道這個舊方法已經不可行：</label><textarea name="old_method_known" placeholder="例如：一直解釋／一直證明自己／一直讓對方理解／一直等待對方承認／一直腦內辯論／一直想辦法不要惹對方生氣"></textarea></section>
<section class="prompt-card"><div class="num">覺察 02</div><label>但我的意識還是一直想用：</label><textarea name="old_method_pull" placeholder="例如：解釋到他懂／證明我沒有問題／證明我是對的／讓對方道歉／想出一個完美說法／在腦中跟對方辯論到贏"></textarea></section>
<section class="prompt-card"><div class="num">覺察 03</div><label>這個舊方法以前保護我的是：</label><textarea name="protected" placeholder="例如：避免衝突／避免被罵／避免被誤會／讓我感覺還有機會被理解／讓我感覺自己還能控制局面／讓我不用直接感覺失望"></textarea></section>
<section class="prompt-card"><div class="num">覺察 04</div><label>但現在它讓我失去的是：</label><textarea name="lost" placeholder="例如：我的時間／我的能量／我的安靜／我的判斷力／我的睡眠／我的注意力／我的生活／我的新方法／我的自由"></textarea></section>
<section class="prompt-card"><div class="num">覺察 05</div><label>我想為意識行動爭取的權限是：</label><textarea name="right" placeholder="例如：我有權停止腦內辯論／我有權不再反覆解釋／我有權不用舊方法解題／我有權讓新的想法出現／我有權把思考方向從對方身上移回自己"></textarea></section>
<section class="prompt-card"><div class="num">覺察 06</div><label>我可以這樣行使這個意識行動主權：</label><textarea name="practice" placeholder="例如：停止解釋／停止一輪腦內辯論／承認這個方法已經沒用了／先不想對方要怎麼懂／問自己我真正想把時間用在哪裡"></textarea><div class="hint">行使意識行動主權，不是強迫自己不要想，而是當你發現自己又走回舊路時，讓意識有機會轉向。</div></section>
<div class="actions no-print"><button type="button" class="primary" onclick="saveAndGo('boundary_conscious_action','conscious-action-result.html')">生成我的意識行動主權分立頁</button><a class="button" href="index.html">回首頁</a></div>
</form></main><script src="script.js"></script></body></html>
