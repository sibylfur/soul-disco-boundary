<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>身體主權</title><link rel="stylesheet" href="styles.css"></head><body><main class="container"><nav class="nav no-print"><a href="index.html">← 回首頁</a></nav>
<section class="hero"><div class="eyebrow">身體主權</div><h1>我感覺不舒服，但我不知道為什麼</h1><p class="lead">身體的不舒服，不一定是小題大作。它可能是在提醒我：有什麼東西靠得太近了，有什麼事情我承受太久了，有什麼界線已經被碰到。</p><p>這一頁不是要你立刻分析原因。先聽見身體正在說什麼。</p></section>
<form data-form>
<section class="prompt-card"><div class="num">覺察 01</div><label>當我想到或靠近：</label><textarea name="trigger" placeholder="例如：某個人、某件事、某個地方、某種對話、某個要求、某個眼神、某種訊息"></textarea><label>我的身體會：</label><textarea name="body_reacts" placeholder="例如：胸口緊、胃縮、肩膀硬、頭脹、想吐、想逃、想哭、想睡、全身發麻、呼吸變淺"></textarea></section>
<section class="prompt-card"><div class="num">覺察 02</div><label>這個不舒服最像是在說：</label><textarea name="body_says" placeholder="例如：我不想靠近／我不想再聽／我想離開／我想休息／我其實很生氣／我已經很累了"></textarea></section>
<section class="prompt-card"><div class="num">覺察 03</div><label>我的身體最想做的動作是：</label><textarea name="wanted_action" placeholder="例如：後退、逃走、推開、躲起來、轉身、關門、摀耳朵、不看對方、哭、叫出來、罵回去、躺下、睡覺"></textarea><div class="hint">可以寫任何身體真實想做的動作，不需要先判斷可不可以。</div></section>
<section class="prompt-card"><div class="num">覺察 04</div><label>但我沒有讓身體這樣做，因為：</label><textarea name="why_not" placeholder="例如：我怕對方生氣／我怕被說太敏感／我怕衝突／我怕拒絕之後變成壞人／我怕我只是想太多"></textarea></section>
<section class="prompt-card"><div class="num">覺察 05</div><label>所以我讓身體承受了：</label><textarea name="body_bore" placeholder="例如：繼續待在不舒服的地方／繼續聽不想聽的話／接收別人的情緒／假裝沒事／忍住想逃的衝動"></textarea></section>
<section class="prompt-card"><div class="num">覺察 06</div><label>我想為身體爭取的權限是：</label><textarea name="right" placeholder="例如：我有權感覺不舒服／我有權相信身體訊號／我有權拉開距離／我有權停止承受／我有權休息"></textarea></section>
<section class="prompt-card"><div class="num">覺察 07</div><label>我可以這樣行使這個身體主權：</label><textarea name="practice" placeholder="例如：退後一步／離開現場／把手收回來／說我不舒服／先不要回訊息／讓身體不要再假裝沒事"></textarea><div class="hint">行使身體主權，不一定要很溫和，也不一定要立刻解釋清楚。</div></section>
<div class="actions no-print"><button type="button" class="primary" onclick="saveAndGo('boundary_body','body-result.html')">生成我的身體主權分立頁</button><a class="button" href="index.html">回首頁</a></div>
</form></main><script src="script.js"></script></body></html>
