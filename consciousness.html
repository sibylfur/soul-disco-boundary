<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>意識主權</title><link rel="stylesheet" href="styles.css"></head><body><main class="container"><nav class="nav no-print"><a href="index.html">← 回首頁</a></nav>
<section class="hero"><div class="eyebrow">意識主權</div><h1>我一直覺得別人都怎樣</h1><p class="lead">有時候，主權不是從身體開始離開，而是從意識開始離開。</p><p>我開始用別人的眼光看自己，開始在腦中替自己辯護，開始等對方承認，才敢相信自己的感覺。</p><p>這一頁不是要你說服對方。是讓你看見：你的意識，現在是不是還被誰的眼光、語氣、評價或否認牽著走。</p></section>
<form data-form>
<section class="prompt-card"><div class="num">覺察 01</div><label>我一直覺得對方：</label><textarea name="thought" placeholder="例如：他們覺得我有問題／他們覺得我太敏感／他們根本不懂我／他們一直想控制我／他們不承認自己傷害我"></textarea></section>
<section class="prompt-card"><div class="num">覺察 02</div><label>當我這樣想時，我最想證明的是：</label><textarea name="prove" placeholder="例如：我沒有問題／我不是太敏感／我真的受傷了／我不是壞人／我有資格不開心／我不是他們說的那樣"></textarea></section>
<section class="prompt-card"><div class="num">覺察 03</div><label>如果我不再證明，我最害怕的是：</label><textarea name="fear" placeholder="例如：他們會以為自己是對的／我的痛苦就不成立了／我好像就輸了／我會被誤解／我會好像真的有問題"></textarea></section>
<section class="prompt-card"><div class="num">覺察 04</div><label>所以我可能把這個權限交給了對方：</label><textarea name="handed_over" placeholder="例如：判斷權、定義權、解釋權、痛苦是否成立的認證權、我是不是太敏感的裁決權、我能不能相信自己的允許權"></textarea></section>
<section class="prompt-card"><div class="num">覺察 05</div><label>我想為意識爭取的權限是：</label><textarea name="right" placeholder="例如：我有權相信自己的感覺／我有權用我的版本理解這件事／我有權不再等待對方承認／我有權不再證明自己沒問題"></textarea></section>
<section class="prompt-card"><div class="num">覺察 06</div><label>我可以這樣行使這個意識主權：</label><textarea name="practice" placeholder="例如：停止在腦中替自己辯護／寫下我自己的版本／不把對方反應當成我的結論／把注意力從他怎麼看我移回我怎麼看這件事"></textarea><div class="hint">行使意識主權，不一定是跟對方爭辯，而是奪回自己的裁判席。</div></section>
<div class="actions no-print"><button type="button" class="primary" onclick="saveAndGo('boundary_consciousness','consciousness-result.html')">生成我的意識主權分立頁</button><a class="button" href="index.html">回首頁</a></div>
</form></main><script src="script.js"></script></body></html>
