<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>身體行動主權</title><link rel="stylesheet" href="styles.css"></head><body><main class="container"><nav class="nav no-print"><a href="index.html">← 回首頁</a></nav>
<section class="hero"><div class="eyebrow">身體行動主權</div><h1>我知道不對，但我做不到</h1><p class="lead">有時候，我不是不知道自己的界線。我知道，但我的身體動不了。</p><p>我可能想逃，卻站在原地；想拒絕，卻說好；很生氣，卻笑出來；想離開，卻繼續留下。</p><p>這一頁不是要你立刻做出很大的改變。先看見：你的身體其實想動去哪裡。</p></section>
<form data-form>
<section class="prompt-card"><div class="num">覺察 01</div><label>我明明想做的是：</label><textarea name="wanted" placeholder="例如：我想拒絕／我想逃走／我想離開／我想罵回去／我想說不要／我想停止對話／我想讓對方知道我很生氣"></textarea></section>
<section class="prompt-card"><div class="num">覺察 02</div><label>但我實際上做的是：</label><textarea name="actual" placeholder="例如：我答應了／我留下來／我假裝沒事／我繼續解釋／我忍住不說／我安撫對方／我反過來檢討自己"></textarea></section>
<section class="prompt-card"><div class="num">覺察 03</div><label>我沒有做出真正想做的動作，因為我怕：</label><textarea name="fear" placeholder="例如：我怕衝突／我怕對方生氣／我怕被討厭／我怕被說自私／我怕拒絕後失去關係／我怕一生氣就失控"></textarea></section>
<section class="prompt-card"><div class="num">覺察 04</div><label>這個害怕讓我失去或凍結的行動權限是：</label><textarea name="frozen_right" placeholder="例如：拒絕權、逃走權、離開權、出聲權、停止權、展現憤怒的權限、不再配合的權限、改變距離的權限"></textarea></section>
<section class="prompt-card"><div class="num">覺察 05</div><label>我想為身體行動爭取的權限是：</label><textarea name="right" placeholder="例如：我有權逃走／我有權拒絕／我有權離開／我有權出聲反對／我有權展現憤怒／我有權停止配合"></textarea></section>
<section class="prompt-card"><div class="num">覺察 06</div><label>我可以這樣行使這個身體行動主權：</label><textarea name="practice" placeholder="例如：逃走／明確拒絕／把話說重一點／停止解釋／直接離開／掛電話／出言爭取／說你不可以這樣對我"></textarea><div class="hint">行使身體行動主權，不一定要漂亮，也不一定要很溫柔。這是讓你的主權有聲音、有距離、有動作。</div></section>
<div class="actions no-print"><button type="button" class="primary" onclick="saveAndGo('boundary_body_action','body-action-result.html')">生成我的身體行動主權分立頁</button><a class="button" href="index.html">回首頁</a></div>
</form></main><script src="script.js"></script></body></html>
